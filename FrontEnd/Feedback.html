<!DOCTYPE html>
<html>
<head>
    <title>Feedback - Delicious Bites</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="Feedback.css">
</head>

<body>

    <header>
        <h1>Customer Feedback</h1>
        <p>Your opinion helps us improve our service.</p>
    </header>

    <div class="container">

        <div class="image-section">
            <img src="Restaurant.jpg"
                 alt="Restaurant Image">
        </div>

        <form class="feedback-form"
              id="feedbackForm">

            <label for="customerName">
                Customer Name
            </label>

            <input type="text"
                   id="customerName"
                  
                   placeholder="Enter your name"
                   required>

            <label for="email">
                Email
            </label>

            <input type="email"
                   id="email"
                  
                   placeholder="Enter your email"
                   required>

            <label for="rating">
                Rating
            </label>

            <select id="rating"
                    >

                <option value="Excellent">
                    Excellent ★★★★★
                </option>

                <option value="Very Good">
                    Very Good ★★★★
                </option>

                <option value="Good">
                    Good ★★★
                </option>

                <option value="Average">
                    Average ★★
                </option>

                <option value="Poor">
                    Poor ★
                </option>

            </select>

            <label for="message">
                Your Feedback
            </label>

            <textarea id="message"
                      
                      rows="5"
                      placeholder="Write your feedback here"
                      required>
            </textarea>

            <button type="submit">
                Submit Feedback
            </button>

            <a href="home.html"
               class="home-btn">
                Back to Home
            </a>

        </form>

    </div>

    <script src="Feedback.js"></script>

</body>
</html>

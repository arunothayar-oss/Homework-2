<!DOCTYPE html>
<html>

<head>
    <title>Delicious Bites Login</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="loginStyle.css">
</head>

<body>

    <div class="container">

        <!-- Left Side -->

        <div class="left">

            <h1>Delicious Bites</h1>

            <p>Relax, Eat and Enjoy</p>

            <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=400"
                 alt="Restaurant">

            <h3>Restaurant Management System</h3>

        </div>

        <!-- Right Side -->

        <div class="right">

            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png"
                 class="userLogo"
                 alt="User">

            <h2>Login</h2>
            <form action="/perform_login" method="post">

    <div class="input-group">
        <label>Username</label>
        <input type="text"
              
                name="username"
               required>
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password"
               id="password"
                name="password"
               required>
    </div>

    <button type="submit"
           >
        Login
    </button>

<div class="links">
    <a href="ForgotPassword.html">
        Forgot Password?
    </a>

    <br><br>

    <a href="Register.html">
        New User? Register Here
    </a>
</div>
</form>
            
        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>

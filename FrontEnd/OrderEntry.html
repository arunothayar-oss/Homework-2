<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Entry</title>

    <link rel="stylesheet" href="OrderEntry.css">
</head>

<body>

<div class="container">

    <h1>ORDER ENTRY</h1>

    <div class="form-section">

        <div class="row">
            <label for="customerName">Customer Name</label>
            <input type="text"
                   id="customerName"
                   placeholder="Enter Customer Name">
        </div>

        <div class="row">
            <label for="tableNumber">Table Number</label>
            <input type="number"
                   id="tableNumber"
                   placeholder="Enter Table Number">
        </div>

        <div class="row">
            <label for="foodItem">Food Item</label>

            <select id="foodItem">

                <option value="">Select Item</option>

                <option value="BURGER">Burger</option>

                <option value="PIZZA">Pizza</option>

                <option value="DOSA">Dosa</option>

                <option value="FRIED RICE">Fried Rice</option>

                <option value="COFFEE">Coffee</option>

            </select>
        </div>

        <div class="row">
            <label for="quantity">Quantity</label>
            <input type="number"
                   id="quantity"
                   placeholder="Enter Quantity">
        </div>

        <div class="row">
            <label for="price">Price</label>
            <input type="number"
                   id="price"
                   readonly>
        </div>

        <div class="row">
            <label for="total">Total</label>
            <input type="number"
                   id="total"
                   readonly>
        </div>

        <div class="button-row">
            <button type="button" id="addBtn">
                Add Item
            </button>
        </div>

    </div>

    <h2>ORDER ITEMS</h2>

    <table id="orderTable">

        <thead>
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>

        <!-- IMPORTANT -->
        <tbody id="tableBody">

        </tbody>

    </table>

    <div class="grand-total">

        <label for="grandTotal">
            Grand Total
        </label>

        <input type="text"
               id="grandTotal"
               readonly>

    </div>

    <div class="bottom-buttons">

        <button type="button"
                id="saveOrderBtn">
            Save Order
        </button>

        <button type="button"
                id="clearBtn">
            Clear
        </button>
        <button type="button"
            id="dashboardBtn">
        Dashboard
    </button>
    <button type="button" id="logoutBtn">
        Logout
    </button>



    </div>

</div>

<script src="OrderEntry.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="DashBoard.css">
</head>

<body>

<div class="dashboard-container">

    <h1>Dashboard</h1>

    <div class="card-container">

        <div class="card">
            <h3>Total Orders</h3>
            <p id="totalOrders">0</p>
        </div>

        <div class="card">
            <h3>Total Sales</h3>
            <p id="totalSales">₹0</p>
        </div>

        <div class="card">
            <h3>Feedback Count</h3>
            <p id="feedbackCount">0</p>
        </div>

    </div>

    <div class="button-container">

        <button id="orderBtn">
            Order Entry
        </button>

        <button id="billingBtn">
            Billing
        </button>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

</div>

<script src="DashBoard.js"></script>

</body>
</html>
